name: Deploy static demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages demo
        run: npm run build:pages

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy FinanceForge demo"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -f origin gh-pages

      - name: Enable GitHub Pages source
        run: |
          status=$(curl -L -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')

          cat response.json
          if [ "$status" = "201" ] || [ "$status" = "204" ] || [ "$status" = "409" ]; then
            echo "GitHub Pages source is ready."
            exit 0
          fi

          echo "GitHub Pages could not be enabled automatically. Enable it in Settings > Pages."
          exit 0
